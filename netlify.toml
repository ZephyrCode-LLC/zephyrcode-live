# zephyrcode.live — one app, eight hosts (apex + 7 subdomain aliases on this site).
# Netlify's Next.js runtime handles SSR/ISR + revalidateTag natively.
[build]
  command = "bash scripts/netlify-build.sh"

[build.environment]
  NODE_VERSION = "22"
  # The Supabase anon key is public by design (RLS enforces access); Next inlines
  # NEXT_PUBLIC_* into client chunks, which otherwise trips Netlify's secrets scanner.
  SECRETS_SCAN_OMIT_KEYS = "NEXT_PUBLIC_SUPABASE_ANON_KEY,NEXT_PUBLIC_SUPABASE_URL"
  SECRETS_SCAN_OMIT_PATHS = ".env.local,_reference/*"

[[plugins]]
  package = "@netlify/plugin-nextjs"
