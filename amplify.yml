version: 1
frontend:
  phases:
    preBuild:
      commands:
        - corepack enable
        - corepack prepare pnpm@10.11.0 --activate
        - pnpm install --frozen-lockfile
    build:
      commands:
        # Amplify exposes console env vars at build but NOT to the Next SSR
        # runtime. Write them to .env.production so the server (route handlers,
        # server components) can read REVALIDATE_SECRET etc. at runtime —
        # otherwise /api/revalidate 401s and the publish webhook silently fails.
        # SES_* power the audit-booking emails (src/lib/booking-email.ts); without
        # them the deployed runtime no-ops the send and the route still returns ok.
        - env | grep -E '^(REVALIDATE_SECRET|NEXT_PUBLIC_SUPABASE_URL|NEXT_PUBLIC_SUPABASE_ANON_KEY|NEXT_PUBLIC_ASSET_BASE|NEXT_PUBLIC_BOOK_URL|SES_REGION|SES_ACCESS_KEY_ID|SES_SECRET_ACCESS_KEY)=' >> .env.production
        - pnpm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      # .next/cache is intentionally NOT persisted: it pins stale DB reads into
      # the prerender (new blocks/sims missing from a fresh deploy). Same fix
      # as the reader app; re-fetching at build is cheap and always correct.
      - node_modules/**/*
